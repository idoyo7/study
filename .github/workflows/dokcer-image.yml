name: Docker Image CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout 'study' repository
        uses: actions/checkout@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          registry: docker.io

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push Docker image
        id: build-push
        run: |
          docker build -t "${{ secrets.DOCKER_USERNAME }}/my-gitbook:${{ env.SHORT_SHA }}" .
          docker push "${{ secrets.DOCKER_USERNAME }}/my-gitbook:${{ env.SHORT_SHA }}"

      - name: Checkout 'montstrap-manifest' repository
        if: success()
        uses: actions/checkout@v3
        with:
          repository: idoyo7/montstrap-manifest
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          path: montstrap-manifest

      - name: Update manifest files
        if: success()
        run: |
          cd montstrap-manifest
          sed -i 's|image:.*|image: art.montkim.com/study/my-gitbook:${{ env.SHORT_SHA }}|' prod/study/deployment.yaml
          sed -i 's|image:.*|image: art.montkim.com/study/my-gitbook:${{ env.SHORT_SHA }}|' stage/study/deployment.yaml

      - name: Commit and push changes to 'montstrap-manifest'
        if: success()
        run: |
          cd montstrap-manifest
          git remote set-url origin https://x-access-token:${{ secrets.PERSONAL_GITHUB_TOKEN }}@github.com/idoyo7/montstrap-manifest.git
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add prod/study/deployment.yaml stage/study/deployment.yaml
          git commit -m "Update study image tag to ${{ env.SHORT_SHA }}"
          git push

